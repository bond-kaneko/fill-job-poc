services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: poc
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc"]
      interval: 2s
      timeout: 2s
      retries: 20

  elasticmq:
    image: softwaremill/elasticmq-native:1.6.11
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./scripts/elasticmq.conf:/opt/elasticmq.conf
